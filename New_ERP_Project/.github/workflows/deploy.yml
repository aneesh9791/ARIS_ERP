name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: erp.feenixtech.com
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/aris/deploy.sh
