# Nginx config for erp.feeenixtech.com
# Place this file at: /etc/nginx/sites-available/erp.feeenixtech.com
# Then: sudo ln -s /etc/nginx/sites-available/erp.feeenixtech.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name erp.feeenixtech.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.feeenixtech.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/erp.feeenixtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.feeenixtech.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # Hide server version
    server_tokens off;

    # Request size limit (matches backend 10mb limit)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Proxy to Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Local API: only accessible internally, block from Nginx entirely
    location /local-api/ {
        deny all;
        return 403;
    }

    # Serve React frontend (if built into backend/public)
    location / {
        root   /var/www/aris-erp;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Access and error logs
    access_log /var/log/nginx/erp.feeenixtech.com.access.log;
    error_log  /var/log/nginx/erp.feeenixtech.com.error.log;
}
